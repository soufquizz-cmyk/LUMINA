<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>VeloraVIP Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="header header--login-only">
        <h1>Xtream Codes Player</h1>
        <p class="sub">Connexion Nodecast — proxy API et flux (CORS).</p>
      </header>

      <section class="panel login-panel">
        <div class="login-card">
          <div class="login-card__brand">
            <span class="login-card__play" aria-hidden="true">▶</span>
            <div>
              <div class="login-card__title">VELORA</div>
              <div class="login-card__tag">Premium IPTV</div>
            </div>
          </div>
          <div class="field">
            <label for="server">URL du serveur</label>
            <input
              id="server"
              type="url"
              placeholder="http://exemple.com:8080"
              autocomplete="off"
            />
          </div>
          <div class="field row">
            <div>
              <label for="user">Identifiant</label>
              <input id="user" type="text" autocomplete="username" />
            </div>
            <div>
              <label for="pass">Mot de passe</label>
              <input id="pass" type="password" autocomplete="current-password" />
            </div>
          </div>
          <div class="actions">
            <button type="button" id="btn-connect" class="primary">Connexion</button>
            <span id="login-status" class="status" aria-live="polite"></span>
          </div>
        </div>
      </section>

      <main class="main main--velora hidden" id="main">
        <div class="vel-sticky-top">
          <header class="vel-header">
            <div class="vel-brand">Velora<span>VIP</span></div>
            <div class="vel-header__right">
              <a href="/admin.html" class="vel-admin-link" title="Admin">Admin</a>
              <select id="country-select" class="country-select" aria-label="Pays"></select>
              <button type="button" id="btn-logout" class="vel-logout" title="Déconnexion">
                Out
              </button>
            </div>
          </header>

          <div id="now-playing" class="player-now-playing vel-now-playing hidden" role="status" aria-live="polite"></div>

          <div id="player-container" class="player-container hidden" aria-hidden="true">
            <div class="video-wrapper">
              <video id="video" controls playsinline></video>
            </div>
          </div>
        </div>

        <div class="vel-body">
          <div class="nav-tabs" id="main-tabs" role="tablist">
            <button type="button" class="tab active" id="tab-live" data-tab="live" role="tab">
              DIRECT TV
            </button>
            <button type="button" class="tab" id="tab-movies" data-tab="movies" role="tab">
              FILMS
            </button>
            <button type="button" class="tab" id="tab-series" data-tab="series" role="tab">
              SÉRIES
            </button>
          </div>

          <div id="packages-view" class="grid vel-packages" aria-label="Bouquets"></div>

          <div id="content-view" class="hidden">
            <button type="button" id="btn-back-home" class="back-btn" title="Retour à l'accueil">
              <span class="back-btn__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M14 6L8 12l6 6"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="back-btn__text">Accueil</span>
            </button>
            <div id="cat-pills-wrap" class="cat-pills-wrap vel-cat-pills-wrap hidden">
              <div id="cat-pills" class="vel-pills" role="tablist" aria-label="Filtres"></div>
            </div>
            <div class="item-list" id="dynamic-list"></div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

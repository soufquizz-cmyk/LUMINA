<!DOCTYPE html>

    <title>VeloraVIP — Aperçu fiche film (statique)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <div class="app">
      <main class="main main--velora" id="main">
        <div class="vel-sticky-top">

              type="button"
              class="tab"
              id="tab-live"
              data-tab="live"
              role="tab"
              aria-selected="false"
              tabindex="-1"
            >
              DIRECT TV
            </button>
            <button
              type="button"
              class="tab active"
              id="tab-movies"
              data-tab="movies"
              role="tab"
              aria-selected="true"
              tabindex="0"
            >
              FILMS
            </button>
            <button
              type="button"
              class="tab"
              id="tab-series"
              data-tab="series"
              role="tab"
              aria-selected="false"
              tabindex="-1"
            >
              SÉRIES
            </button>
          </div>

          <div
            id="content-view"
            class="content-view--vod-film-detail"
            role="region"
            aria-labelledby="vod-detail-heading"
          >
            <div class="vel-content-toolbar">
              <button
                type="button"
                id="btn-back-home"
                class="back-btn"
                title="Retour à la liste des films"
                aria-label="Retour à la liste des films"
              >
                <span class="back-btn__icon" aria-hidden="true">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M14 6L8 12l6 6"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
                <span class="back-btn__text">Liste</span>
              </button>
              <div id="vel-admin-add-channels-wrap" class="vel-admin-add-channels-wrap hidden">
                <button type="button" id="btn-admin-add-channels" class="vel-admin-add-channels-btn">
                  + Ajouter des chaînes au bouquet
                </button>
              </div>
            </div>
            <div id="cat-pills-wrap" class="cat-pills-wrap vel-cat-pills-wrap hidden">
              <div id="cat-pills" class="vel-pills" role="tablist" aria-label="Filtres"></div>
            </div>
            <div class="item-list item-list--vod-film-detail" id="dynamic-list">
              <article class="vel-vod-detail" aria-label="Paris à Tout Prix (2013)">
                <div
                  class="vel-vod-detail__bg"
                  style="background-image: linear-gradient(180deg, rgba(6, 4, 12, 0.06) 0%, rgba(6, 4, 12, 0.1) 32%, rgba(6, 4, 12, 0.45) 58%, rgba(6, 4, 12, 0.88) 82%, rgba(6, 4, 12, 0.97) 100%), url(&quot;/proxy?target=https%3A%2F%2Fimage.tmdb.org%2Ft%2Fp%2Fw600_and_h900_bestv2%2Fl0TqmtksDVWgEO6J5XtW4yHFfGV.jpg&amp;from=https%3A%2F%2Fimage.tmdb.org%2Ft%2Fp%2Fw600_and_h900_bestv2%2Fl0TqmtksDVWgEO6J5XtW4yHFfGV.jpg&quot;);"
                ></div>
                <div class="vel-vod-detail__inner">
                  <h1 class="vel-vod-detail__title" id="vod-detail-heading">Paris à Tout Prix (2013)</h1>
                  <div class="vel-vod-detail__meta">
                    <span class="vel-vod-detail__rating vel-vod-detail__rating--empty">
                      <span class="sr-only">Aucune note disponible</span>
                    </span>
                    <span class="vel-vod-detail__genre hidden"></span>
                  </div>
                  <p class="vel-vod-detail__plot">Aucune description disponible pour ce titre.</p>
                  <section class="vel-vod-detail__section">
                    <h2 class="vel-vod-detail__section-title">Distribution</h2>
                    <p class="vel-vod-detail__cast">Non communiqué.</p>
                  </section>
                  <section class="vel-vod-detail__section hidden" aria-hidden="true">
                    <h2 class="vel-vod-detail__section-title">Réalisation</h2>
                    <p class="vel-vod-detail__director">—</p>
                  </section>
                  <button
                    type="button"
                    class="vel-vod-detail__watch primary"
                    aria-label="Regarder Paris à Tout Prix (2013)"
                  >
                    Regarder
                  </button>
                </div>
              </article>
            </div>
